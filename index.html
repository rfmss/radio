<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rádio Brasil - Player Vintage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --wood-dark: #1a0f08;
      --wood-medium: #2d1810;
      --wood-light: #4a2c1a;
      --gold: #b8942f;
      --gold-light: #f0d078;
      --gold-dark: #8b6914;
      --cream: #f5e6c8;
      --red: #8b2500;
      --green-led: #39ff14;
      --amber-led: #ffb000;
      --display-bg: #0a1a0a;
      --display-text: #7fff7f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      padding: 20px;
      background-image: 
        radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
    }

    .radio {
      background: linear-gradient(180deg, #3d2817 0%, #1a0f08 100%);
      border-radius: 40px;
      padding: 35px 40px;
      box-shadow: 
        0 30px 80px rgba(0,0,0,0.8),
        0 0 0 6px #1a0f08,
        0 0 0 8px #3d2817,
        0 0 0 10px #0a0a0a,
        inset 0 2px 0 rgba(255,255,255,0.1);
      max-width: 520px;
      width: 100%;
      position: relative;
    }

    .radio::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }

    .speaker-grille {
      position: absolute;
      top: 25px;
      right: 30px;
      width: 60px;
      height: 60px;
      background: 
        radial-gradient(circle at center, #1a1a1a 2px, transparent 2px),
        repeating-linear-gradient(0deg, transparent, transparent 4px, #1a1a1a 4px, #1a1a1a 5px);
      background-size: 6px 6px;
      border-radius: 50%;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .brand {
      font-family: 'Archivo Black', sans-serif;
      color: var(--gold-light);
      font-size: 1.6rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 30px rgba(240, 208, 120, 0.3);
      letter-spacing: 4px;
    }

    .subtitle {
      color: var(--cream);
      font-size: 0.75rem;
      opacity: 0.7;
      letter-spacing: 2px;
      margin-top: 5px;
    }

    .display {
      background: var(--display-bg);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      border: 4px solid var(--gold-dark);
      box-shadow: 
        inset 0 0 40px rgba(0,0,0,0.8),
        0 0 20px rgba(57, 255, 20, 0.1);
    }

    .display::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      border-radius: 16px;
    }

    .station-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green-led);
      box-shadow: 0 0 10px var(--green-led), 0 0 20px var(--green-led);
      animation: pulse 2s infinite;
    }

    .led.error {
      background: #ff3333;
      box-shadow: 0 0 10px #ff3333, 0 0 20px #ff3333;
    }

    .led.loading {
      background: var(--amber-led);
      box-shadow: 0 0 10px var(--amber-led), 0 0 20px var(--amber-led);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .station-name {
      color: var(--gold);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 700;
    }

    .track-name {
      color: var(--display-text);
      font-size: 1.1rem;
      font-weight: 700;
      text-shadow: 0 0 15px var(--green-led);
      line-height: 1.4;
      min-height: 2.8em;
    }

    .track-artist {
      color: var(--display-text);
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 8px;
    }

    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 30px;
      margin: 15px 0;
    }

    .waveform-bar {
      width: 4px;
      background: var(--green-led);
      border-radius: 2px;
      transition: height 0.1s ease;
    }

    .freq-display {
      text-align: center;
      margin-top: 15px;
      padding: 12px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      border: 1px solid rgba(57, 255, 20, 0.2);
    }

    .freq {
      font-family: 'Courier New', monospace;
      font-size: 1.8rem;
      color: var(--green-led);
      text-shadow: 0 0 20px var(--green-led);
      letter-spacing: 4px;
    }

    .progress-container {
      margin-top: 20px;
    }

    .progress-bar {
      height: 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(57, 255, 20, 0.2);
    }

    .progress {
      height: 100%;
      background: linear-gradient(90deg, var(--green-led), #7fff7f);
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s linear;
      box-shadow: 0 0 15px var(--green-led);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: var(--display-text);
    }

    .controls-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 20px;
    }

    .ctrl-btn {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
      color: #1a0f08;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 
        0 5px 15px rgba(0,0,0,0.4),
        inset 0 2px 0 rgba(255,255,255,0.4),
        inset 0 -2px 0 rgba(0,0,0,0.2);
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(184, 148, 47, 0.5);
    }

    .ctrl-btn:active {
      transform: translateY(1px);
    }

    .ctrl-btn.play {
      width: 70px;
      height: 70px;
      font-size: 1.8rem;
    }

    .ctrl-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .secondary-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .sec-btn {
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sec-btn:hover {
      background: var(--gold);
      color: #1a0f08;
    }

    .sec-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }

    .favorites-panel {
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      padding: 15px;
      max-height: 180px;
    }

    .fav-header {
      color: var(--gold);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fav-list {
      overflow-y: auto;
      max-height: 120px;
    }

    .fav-item {
      background: rgba(0,0,0,0.4);
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .fav-item:hover {
      background: rgba(184, 148, 47, 0.2);
    }

    .fav-info {
      flex: 1;
      min-width: 0;
    }

    .fav-title {
      color: var(--cream);
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fav-artist {
      color: var(--cream);
      opacity: 0.5;
      font-size: 0.7rem;
    }

    .fav-remove {
      background: none;
      border: none;
      color: #ff4444;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .fav-remove:hover { opacity: 1; }

    .empty-fav {
      color: var(--cream);
      opacity: 0.4;
      text-align: center;
      font-size: 0.8rem;
      padding: 20px;
    }

    .status-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
      font-size: 0.7rem;
      color: var(--gold);
      opacity: 0.7;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="radio">
    <div class="speaker-grille"></div>
    
    <div class="header">
      <div class="brand">RÁDIO BRASIL</div>
      <div class="subtitle">Acervo de Domínio Público</div>
    </div>

    <div class="display">
      <div class="station-label">
        <div class="led" id="led"></div>
        <span class="station-name" id="stationLabel">Buscando acervo...</span>
      </div>
      
      <div class="track-name" id="trackTitle">Aguarde</div>
      <div class="track-artist" id="trackArtist">-</div>
      
      <div class="waveform" id="waveform">
        <div class="waveform-bar" style="height: 10px;"></div>
        <div class="waveform-bar" style="height: 15px;"></div>
        <div class="waveform-bar" style="height: 20px;"></div>
        <div class="waveform-bar" style="height: 15px;"></div>
        <div class="waveform-bar" style="height: 10px;"></div>
        <div class="waveform-bar" style="height: 15px;"></div>
        <div class="waveform-bar" style="height: 20px;"></div>
        <div class="waveform-bar" style="height: 15px;"></div>
        <div class="waveform-bar" style="height: 10px;"></div>
      </div>
      
      <div class="freq-display">
        <div class="freq" id="frequency">--.- FM</div>
      </div>
      
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
    </div>

    <div class="controls-row">
      <button class="ctrl-btn" id="prevBtn" title="Anterior">⏮</button>
      <button class="ctrl-btn play" id="playBtn" title="Play">▶</button>
      <button class="ctrl-btn" id="nextBtn" title="Próxima">⏭</button>
    </div>

    <div class="secondary-row">
      <button class="sec-btn" id="shuffleBtn">🔀 Aleatório</button>
      <button class="sec-btn" id="favBtn">♡ Favorito</button>
      <button class="sec-btn" id="refreshBtn">↻ Atualizar</button>
    </div>

    <div class="favorites-panel">
      <div class="fav-header">⭐ Meus Favoritos</div>
      <div class="fav-list" id="favList">
        <div class="empty-fav">Nenhum favorito salvo</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item">
        <span>♫</span>
        <span id="trackCount">0 faixas</span>
      </div>
      <div class="status-item">
        <span>◉</span>
        <span id="statusText">Pronto</span>
      </div>
    </div>
  </div>

  <script>
    const TIMEOUT_MS = 4000;
    
    let playlist = [];
    let currentIndex = 0;
    let isPlaying = false;
    let favorites = JSON.parse(localStorage.getItem('radioFavorites')) || [];
    let shuffle = false;
    let isLoading = false;

    const audio = new Audio();
    audio.crossOrigin = "anonymous";

    const led = document.getElementById('led');
    const stationLabel = document.getElementById('stationLabel');
    const trackTitle = document.getElementById('trackTitle');
    const trackArtist = document.getElementById('trackArtist');
    const frequency = document.getElementById('frequency');
    const progress = document.getElementById('progress');
    const currentTime = document.getElementById('currentTime');
    const totalTime = document.getElementById('totalTime');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const favBtn = document.getElementById('favBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const favList = document.getElementById('favList');
    const trackCount = document.getElementById('trackCount');
    const statusText = document.getElementById('statusText');
    const waveform = document.getElementById('waveform');

    function setStatus(text, loading = false) {
      statusText.textContent = text;
      led.className = 'led' + (loading ? ' loading' : '');
    }

    function updateWaveform() {
      const bars = waveform.querySelectorAll('.waveform-bar');
      bars.forEach(bar => {
        if (isPlaying) {
          bar.style.height = Math.random() * 25 + 5 + 'px';
        } else {
          bar.style.height = '10px';
        }
      });
    }

    function searchArchive() {
      const savedPlaylist = localStorage.getItem('radioPlaylist');
      
      if (savedPlaylist) {
        try {
          const saved = JSON.parse(savedPlaylist);
          if (saved.length > 0) {
            playlist = saved.map(item => ({
              id: item.id,
              title: item.title,
              artist: item.artist,
              url: item.url,
              verified: true
            }));
            
            trackCount.textContent = `${playlist.length} faixas`;
            setStatus('Catálogo verificado carregado');
            shufflePlaylist();
            loadTrack(0);
            return;
          }
        } catch (e) {
          console.log('Erro ao carregar catálogo salvo:', e);
        }
      }
      
      setStatus('Buscando no Archive.org...', true);
      
      const queries = [
        'subject:"Brazilian music" AND mediatype:audio',
        'subject:"samba" AND mediatype:audio',
        'subject:"choro" AND mediatype:audio',
        'subject:"bossa nova" AND mediatype:audio',
        'subject:"forró" AND mediatype:audio'
      ];

      const fetchPromises = queries.slice(0, 3).map(q => 
        fetch(`https://archive.org/advancedsearch.php?q=${encodeURIComponent(q)}&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=date&rows=50&output=json`)
          .then(r => r.json())
          .catch(() => ({ response: { docs: [] } }))
      );

      Promise.all(fetchPromises).then(results => {
        const allDocs = results.flatMap(r => r.response?.docs || []).filter(d => d.identifier);
        
        const seen = new Set();
        const unique = allDocs.filter(d => {
          if (seen.has(d.identifier)) return false;
          seen.add(d.identifier);
          return true;
        }).slice(0, 100);

        playlist = unique.map(doc => ({
          id: doc.identifier,
          title: doc.title?.[0] || 'Sem título',
          artist: doc.creator?.[0] || 'Artista desconhecido',
          year: doc.date?.[0]?.substring(0, 4),
          url: `https://archive.org/download/${doc.identifier}/`,
          verified: false
        })).filter(p => p.title && p.title !== 'Sem título');

        trackCount.textContent = `${playlist.length} faixas`;
        
        if (playlist.length > 0) {
          setStatus('Pronto para tocar');
          shufflePlaylist();
          loadTrack(0);
        } else {
          setStatus('Nenhuma faixa encontrada');
        }
      });
    }

    function shufflePlaylist() {
      for (let i = playlist.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
      }
    }

    async function tryLoadAudio(url) {
      return new Promise((resolve, reject) => {
        const testAudio = new Audio();
        testAudio.crossOrigin = "anonymous";
        
        const timeout = setTimeout(() => {
          testAudio.src = '';
          reject(new Error('Timeout'));
        }, TIMEOUT_MS);

        testAudio.oncanplaythrough = () => {
          clearTimeout(timeout);
          resolve(url);
        };
        
        testAudio.onerror = () => {
          clearTimeout(timeout);
          reject(new Error('Erro'));
        };

        testAudio.src = url;
        testAudio.load();
      });
    }

    async function getValidAudioUrl(track) {
      const tryUrls = [
        track.url + track.id + '.mp3',
        track.url + track.id + '_64kb.mp3',
        track.url + '01.mp3',
        track.url + '01_64kb.mp3',
        track.url + track.id + '.ogg',
        track.url + track.id + '_vbr.mp3'
      ];

      for (const url of tryUrls) {
        try {
          const valid = await tryLoadAudio(url);
          return valid;
        } catch {
          continue;
        }
      }
      return null;
    }

    async function loadTrack(index) {
      if (playlist.length === 0) return;
      
      currentIndex = index;
      const track = playlist[currentIndex];
      
      trackTitle.textContent = 'Procurando áudio...';
      trackArtist.textContent = '-';
      setStatus('Buscando fonte...', true);
      isLoading = true;
      playBtn.disabled = true;

      try {
        const audioUrl = await getValidAudioUrl(track);
        
        if (!audioUrl) {
          setStatus('Sem áudio disponível', true);
          nextTrack();
          return;
        }

        audio.src = audioUrl;
        trackTitle.textContent = track.title;
        trackArtist.textContent = track.artist;
        frequency.textContent = (87.5 + (currentIndex % 30) * 0.5).toFixed(1) + ' FM';
        
        setStatus('Pronto');
        playBtn.disabled = false;
        isLoading = false;
        
        updateFavButton();
        renderFavorites();
      } catch (e) {
        console.error('Erro ao carregar:', e);
        setStatus('Erro, pulando...', true);
        nextTrack();
      }
    }

    function togglePlay() {
      if (isLoading) return;
      
      if (isPlaying) {
        audio.pause();
        playBtn.textContent = '▶';
      } else {
        audio.play().catch(e => {
          setStatus('Erro ao reproduzir', true);
        });
        playBtn.textContent = '⏸';
      }
      isPlaying = !isPlaying;
    }

    function nextTrack() {
      const next = (currentIndex + 1) % playlist.length;
      loadTrack(next);
      if (isPlaying) audio.play();
    }

    function prevTrack() {
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
      } else {
        const prev = (currentIndex - 1 + playlist.length) % playlist.length;
        loadTrack(prev);
        if (isPlaying) audio.play();
      }
    }

    function toggleFavorite() {
      if (playlist.length === 0) return;
      
      const track = playlist[currentIndex];
      const idx = favorites.findIndex(f => f.id === track.id);
      
      if (idx >= 0) {
        favorites.splice(idx, 1);
      } else {
        favorites.push({ ...track });
      }
      
      localStorage.setItem('radioFavorites', JSON.stringify(favorites));
      updateFavButton();
      renderFavorites();
    }

    function updateFavButton() {
      if (playlist.length === 0) return;
      const track = playlist[currentIndex];
      const isFav = favorites.some(f => f.id === track.id);
      favBtn.classList.toggle('active', isFav);
      favBtn.textContent = isFav ? '♥ Favorito' : '♡ Favorito';
    }

    function renderFavorites() {
      if (favorites.length === 0) {
        favList.innerHTML = '<div class="empty-fav">Nenhum favorito salvo</div>';
        return;
      }

      favList.innerHTML = favorites.map((fav, idx) => `
        <div class="fav-item" data-id="${fav.id}">
          <div class="fav-info">
            <div class="fav-title">${fav.title}</div>
            <div class="fav-artist">${fav.artist}</div>
          </div>
          <button class="fav-remove" data-idx="${idx}">✕</button>
        </div>
      `).join('');

      favList.querySelectorAll('.fav-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (e.target.classList.contains('fav-remove')) return;
          const track = playlist.find(t => t.id === item.dataset.id);
          if (track) {
            const idx = playlist.indexOf(track);
            loadTrack(idx);
            if (!isPlaying) togglePlay();
          } else {
            const tempTrack = favorites.find(f => f.id === item.dataset.id);
            if (tempTrack) {
              playlist.unshift(tempTrack);
              currentIndex = 0;
              loadTrack(0);
              if (!isPlaying) togglePlay();
            }
          }
        });
      });

      favList.querySelectorAll('.fav-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          favorites.splice(parseInt(btn.dataset.idx), 1);
          localStorage.setItem('radioFavorites', JSON.stringify(favorites));
          renderFavorites();
          updateFavButton();
        });
      });
    }

    function toggleShuffle() {
      shuffle = !shuffle;
      shuffleBtn.classList.toggle('active', shuffle);
    }

    function formatTime(s) {
      if (isNaN(s)) return '0:00';
      return Math.floor(s / 60) + ':' + Math.floor(s % 60).toString().padStart(2, '0');
    }

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progress.style.width = (audio.currentTime / audio.duration * 100) + '%';
        currentTime.textContent = formatTime(audio.currentTime);
      }
    });

    audio.addEventListener('loadedmetadata', () => {
      totalTime.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('ended', () => {
      nextTrack();
    });

    audio.addEventListener('error', () => {
      if (isPlaying) {
        setStatus('Erro, pulando...', true);
        setTimeout(nextTrack, 1000);
      }
    });

    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);
    favBtn.addEventListener('click', toggleFavorite);
    shuffleBtn.addEventListener('click', toggleShuffle);
    refreshBtn.addEventListener('click', () => {
      setStatus('Atualizando...', true);
      searchArchive();
    });

    setInterval(updateWaveform, 150);

    searchArchive();
    renderFavorites();
  </script>
</body>
</html>
